[tools]
go = "latest"

[tasks.build]
description = "Build the qry binary"
run = "go build -o bin/qry ."

[tasks.run]
description = "Run qry (pass args with -- e.g. mise run run -- 'my query')"
run = "go run . $@"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.tidy]
description = "Tidy go modules"
run = "go mod tidy"

[tasks.lint]
description = "Run go vet"
run = "go vet ./..."

[tasks.pre-commit]
description = "Pre-commit hook: run go vet on staged Go files"
run = """
STAGED_GO=$(echo "$STAGED" | tr ' ' '\n' | grep '[.]go$' || true)
if [ -z "$STAGED_GO" ]; then
  exit 0
fi
echo "go vet ./..."
go vet ./...
"""

[tasks.build-all]
description = "Build qry and all adapters"
run = """
go build -o bin/qry .
go build -o bin/qry-adapter-mock ./adapters/qry-adapter-mock/
go build -o bin/qry-adapter-brave-api ./adapters/qry-adapter-brave-api/
go build -o bin/qry-adapter-ddg-scrape ./adapters/qry-adapter-ddg-scrape/
go build -o bin/qry-adapter-brave-scrape ./adapters/qry-adapter-brave-scrape/
go build -o bin/qry-adapter-exa ./adapters/qry-adapter-exa/
"""

[tasks.test-e2e]
description = "End-to-end test using the mock adapter"
run = """
mise run build-all
./bin/qry --config ./config.test.toml "what is the latest version of numpy"
"""
