name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set binary suffix
        id: suffix
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            echo "ext=.exe" >> "$GITHUB_OUTPUT"
          else
            echo "ext=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          TAG=${{ github.ref_name }}
          OS=${{ matrix.goos }}
          ARCH=${{ matrix.goarch }}
          EXT=${{ steps.suffix.outputs.ext }}
          OUTDIR=dist/${OS}_${ARCH}
          mkdir -p "$OUTDIR"

          go build -ldflags="-s -w -X main.version=${TAG}" \
            -o "${OUTDIR}/qry${EXT}" .

          for adapter in adapters/*/; do
            name=$(basename "$adapter")
            # skip mock and google-api (deprecated)
            if [ "$name" = "mock" ] || [ "$name" = "google-api" ]; then
              continue
            fi
            go build -ldflags="-s -w" \
              -o "${OUTDIR}/qry-adapter-${name}${EXT}" "./${adapter}"
          done

      - name: Create archives
        run: |
          OS=${{ matrix.goos }}
          ARCH=${{ matrix.goarch }}
          TAG=${{ github.ref_name }}
          OUTDIR=dist/${OS}_${ARCH}
          ARCHIVE_NAME="qry_${TAG}_${OS}_${ARCH}"

          if [ "$OS" = "windows" ]; then
            cd "$OUTDIR" && zip "../../${ARCHIVE_NAME}.zip" ./* && cd -
          else
            tar -czf "${ARCHIVE_NAME}.tar.gz" -C "$OUTDIR" .
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qry_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 1

  publish:
    name: Publish release
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: |
          cd dist/
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
